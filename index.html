<!DOCTYPE html> <!-- tells browser we're using HTML -->
<html lang="en"> <!-- starts HTML document, english -->
<head> <!-- contains meta information (not shown on webpage) -->

  <link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&display=swap" rel="stylesheet"> <!-- imports Kosugi Maru font from Google API -->
  <link href="https://fonts.googleapis.com/css2?family=Karla:wght@100;400;700&display=swap" rel="stylesheet"> <!-- imports Karla font from Google API -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"> <!-- imports icons from font-awesome API -->
  
  <!-- API = application programming interface (e.g. using Google as a service to pull fonts in via a URL) -->
  <!-- in short, APIs are menus that let you access someone else's system -->
  <!-- rel = relationship; here, tells browser to interpret links as stylesheet values -->
  <!-- href = hyperlink reference; here, tells browser the url of the resource -->
  <!-- *note* all light blue keywords in VS Code are html attributes that sit inside tags and provide additional information about the element! -->

  <meta charset="UTF-8" /> <!-- character encoding (UTF-8 is a common one) -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" /> <!-- sets page width to width of device, zoom level to 100% -->
  
  <link href="favicon.png" rel="icon" type="image/png"> <!-- sets tab icon: link to image, interpret as icon, expect a png image file -->
  <title>Hannah Webb</title> <!-- sets tab title (built into html to display this text on tab) -->

  <style> /* block of internal CSS */

    /* styling of HTML tags--text */
    h1 { color: #000000; font-size: 70px; font-weight: 100; margin-top: 42px; margin-bottom: 24px; } 
    h2 { color: #000000; font-size: 19px; font-weight: 700; font-family: 'Karla'; margin: 0; max-width: 560px; text-align: left; }
    p { color: #000000; font-size: 18px; font-family: 'Karla'; margin-top: 20px; max-width: 600px; text-align: left; }
    footer p { color: #000000; font-size: 12px; font-family: 'Karla'; text-align: left; margin: 0 17.5%; }
    /* can give our attributes specific values to style each tag--called CSS properties */
    /* margins are amt of space between current element and other elements */
    /* max-width is the max size of the container that the text can sit in */
    /* text-align sets the side that the text auto aligns to */

    /* styling of HTML tags--navigation bar */
    header { padding-bottom: 0; }
    header::after { content: ''; display: block; width: 65%; height: 1px; background-color: rgba(0,0,0,0.18); margin: 10px auto 0; }
    nav { display: flex; justify-content: center; gap: 90px; margin: 10px 0; } 
    nav a { position: relative; color: #000000; text-decoration: none; font-weight: 400; font-size: 15px; padding: 2px; transition: color 0.3s; }
    /* display: flex; turns container of nav bar into a flexbox--where elements are arranged in a row by default */
    /* justify-content is a unique property of the flexbox; it sets the alignment of the items within the container--center, left, right, etc.*/
    /* gap is another property unique to the flexbox; it sets the spacing between flex items--it's cleaner than using margin on each child. */
    /* a = links in CSS -- here we use a to style the navigation links */
    /* text-decoration: none; styles links to have no underline */
    /* padding: 2px; adds 2px of internal space inside each link (between the text and its edges) */
    /* transition: color 0.3s; enables animation to change color over a 0.3s period */


    /* styling of HTML tag--body */
    body { font-family: 'Kosugi Maru'; background-color: #FFFFFF; text-align: center; padding: 20px; }
    img { margin: 16px; border-radius: 7%; box-shadow: 8px 8px 20px rgba(0, 0, 0, 0.5); width: 30%; min-width: 250px; }
    body::after { content: ""; position: fixed; bottom: 0; left: 0; width: 100%; height: 80px; pointer-events: none; background: linear-gradient(to top, rgb(140, 101, 115), rgba(255,255,255,0)); z-index: 10; }

    /* styling the body tag sets default styles for the whole page, helping you avoid redundant code */
    /* most elements inside the body will inherit these styles unless overriden by more specific attributes */
    /* here, we style the background of our webpage to white, apply the kosugi maru font, center inline content, and add 20px of padding around everything */

    /* styling of HTML classes--features defined in body */
    .home-link { text-decoration: none; color: inherit; } 
    .line { width: 65.75%; height: 1px; background-color: rgba(0,0,0,0.18); margin: 5px auto; }
    .content-wrapper { display: flex; align-items: center; width: 65.75%; margin: 16px auto; }
    .text { font-family: Karla; text-align: left; width: 65.75%; margin: 24px 16px; }
    .icon-row { margin-top: auto; display: flex; gap: 16px; font-size: 22px; margin: auto auto;}
    .icon-row a { color: #000; text-decoration: none; }
    /* by using classes, you are labeling a group of styles that you can apply to your html elements */
    /* when an html tag is inside another html tag, the inner tag is called the child and the outer tag is called the parent */
    /* you can style the child by writing .parent child */

    @media (max-width: 890px) { /* styling that overrides when screen is 768px wide or smaller */
    h1 { font-size: 40px; } 
    h2 { font-size: 16px; } 
    p { font-size: 14px; }
    img { width: 200px; }
    footer p { font-size: 10px; margin: 0 5%; }
    nav a { font-size: 13px; }
    nav { gap: 30px; }
    .line { width: 93.25%; } 
    .text { width: 93.25%; margin: 10px 0px;} 
    .content-wrapper { flex-direction: column; width: 93.25%; }}

    h1:hover { color: #414141; } /* styling when hovering over links */
    nav a:hover { color: rgba(0,0,0,0.3); }
    nav a.active { color: rgba(0,0,0,0.3); }
    .icon-row a:hover { color: #000000; }
  </style>
  </head>
